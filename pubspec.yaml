name: expensetracker
description: "Offline-first premium finance tracker."
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  fl_chart: ^0.70.2
  flutter_animate: ^4.5.2
